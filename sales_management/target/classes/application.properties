# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/inventory}
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.hibernate-orm.database.generation=update

# Gemini API Key
quarkiverse.langchain4j.gemini.api-key=${GEMINI_API_KEY:your-local-key}
google.vision.credentials.path=google-vision-key.json

# Allow your future GitHub Pages frontend to talk to this backend
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,OPTIONS

# Log AI requests during dev
quarkus.log.category."io.quarkiverse.langchain4j".level=DEBUG